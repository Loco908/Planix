{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Eliminar Historia de Usuario</h4>
            </div>
            <div class="card-body p-4 text-center">
                <p class="mb-4">¿Estás completamente seguro de que deseas eliminar la historia: <br>
                <strong>"{{ object.title }}"</strong>?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'projects:detail' project.pk %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sí, eliminar permanentemente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
