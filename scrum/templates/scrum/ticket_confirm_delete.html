{% extends "base.html" %}

{% block title %}Eliminar Ticket{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Confirmar Eliminación</h4>
                </div>
                <div class="card-body">
                    <p>¿Estás seguro que deseas eliminar el ticket <strong>{{ ticket.get_code }}: {{ ticket.title }}</strong>?</p>
                    <p class="text-danger"><i class="bi bi-exclamation-triangle-fill"></i> Esta acción no se puede deshacer.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'scrum:kanban' sprint.pk %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-danger">Sí, eliminar ticket</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
