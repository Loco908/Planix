{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Bienvenido a PLANIX</h2>
                    <p class="text-muted">Inicia sesión para acceder a tus proyectos ágiles.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger p-2 fs-6">
                            Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg" required id="id_username" placeholder="Tu usuario">
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" required id="id_password" placeholder="••••••••">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Acceder al Sistema</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
